<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEEM</title>

<style>
body { font-family: Arial; margin:0; background:#f0f2f5; }
.container { max-width:500px; margin:auto; padding:20px; }
.card { background:#fff; padding:20px; border-radius:10px; margin-bottom:15px; }
input, textarea { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ddd; }
button { padding:12px; border:none; border-radius:8px; color:#fff; cursor:pointer; }
.blue { background:#0066cc; }
.green { background:#28a745; }
.gray { background:#666; }
.post { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; }
.small { font-size:12px; color:#999; }
.header { display:flex; justify-content:space-between; align-items:center; }
</style>

</head>
<body>

<div id="app"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
// ================= CONFIG =================
const SUPABASE_URL = 'https://fghuggfaipwdtwpjsaon.supabase.co'
const SUPABASE_KEY = 'sb_publishable_OnbXuVmC_wOD3fC3f2jo2A_u0Gjp6oi'

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let currentUser = null

// ================= INIT =================
init()

async function init() {
    const { data } = await supabase.auth.getUser()

    if (data?.user) {
        currentUser = data.user
        dashboard()
    } else {
        loginPage()
    }
}

// ================= AUTH =================
function loginPage() {
    app.innerHTML = `
    <div class="container">
        <h2>Login</h2>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button class="blue" onclick="login()">Login</button>
        <p>No account? <a onclick="signupPage()">Signup</a></p>
    </div>`
}

function signupPage() {
    app.innerHTML = `
    <div class="container">
        <h2>Signup</h2>
        <input id="username" placeholder="Username">
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button class="green" onclick="signup()">Signup</button>
        <p><a onclick="loginPage()">Back to login</a></p>
    </div>`
}

async function login() {
    const email = document.getElementById('email').value
    const password = document.getElementById('password').value

    const { data, error } = await supabase.auth.signInWithPassword({ email, password })

    if (error) return alert(error.message)

    currentUser = data.user
    dashboard()
}

async function signup() {
    const username = document.getElementById('username').value
    const email = document.getElementById('email').value
    const password = document.getElementById('password').value

    const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: { data: { username } }
    })

    if (error) return alert(error.message)

    await supabase.from('profiles').insert({
        id: data.user.id,
        username,
        email
    })

    currentUser = data.user
    dashboard()
}

async function logout() {
    await supabase.auth.signOut()
    currentUser = null
    loginPage()
}

// ================= DASHBOARD =================
async function dashboard() {
    const username = currentUser.user_metadata?.username || currentUser.email

    const { data: posts } = await supabase
        .from('posts')
        .select('*')
        .order('created_at', { ascending: false })

    let htmlPosts = ''

    if (posts?.length) {
        posts.forEach(p => {
            htmlPosts += `
            <div class="post">
                <b>${escape(p.title)}</b>
                <p>${escape(p.content)}</p>
                <div class="small">${new Date(p.created_at).toLocaleString()}</div>
            </div>`
        })
    } else {
        htmlPosts = `<p>No posts yet</p>`
    }

    app.innerHTML = `
    <div class="container">

        <div class="header">
            <h3>${escape(username)}</h3>
            <button class="gray" onclick="logout()">Logout</button>
        </div>

        <div class="card">
            <input id="title" placeholder="Title">
            <textarea id="content" placeholder="Write something..."></textarea>
            <button class="blue" onclick="createPost()">Post</button>
        </div>

        ${htmlPosts}

    </div>`
}

// ================= POSTS =================
async function createPost() {
    const title = document.getElementById('title').value
    const content = document.getElementById('content').value

    if (!title || !content) return alert('Fill everything')

    await supabase.from('posts').insert({
        user_id: currentUser.id,
        title,
        content
    })

    dashboard()
}

// ================= UTIL =================
function escape(text) {
    const div = document.createElement('div')
    div.textContent = text
    return div.innerHTML
}
</script>

</body>
</html>
