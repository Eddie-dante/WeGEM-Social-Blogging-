<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>WEEM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --w: #0A0A0F; --w1: #111118; --w2: #18181F; --w3: #22222C; --w4: #2E2E3A; --w5: #3A3A48;
  --accent: #7C5CFC; --accent2: #FF4D8D; --accent3: #00D4AA; --accent4: #FFB443;
  --text1: #F0F0FF; --text2: #A0A0C0; --text3: #606080;
  --radius: 16px; --nav-w: 72px; --right-w: 300px;
  --transition: 0.2s cubic-bezier(0.23, 1, 0.32, 1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--w);color:var(--text1);line-height:1.5;overflow:hidden}
#app{display:flex;height:100%;position:relative}

/* SIDEBAR */
.sidebar{width:var(--nav-w);background:var(--w1);display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:16px;border-right:1px solid var(--w2);z-index:20;flex-shrink:0;height:100%}
.sidebar-item{width:48px;height:48px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--text2);transition:var(--transition);position:relative;background:none;border:none;cursor:pointer}
.sidebar-item:hover,.sidebar-item.active{background:var(--w2);color:var(--accent)}
.sidebar-avatar{margin-top:auto;cursor:pointer}

/* MAIN */
.main-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.content-area{flex:1;overflow-y:auto;padding:20px;display:none}
.content-area.active{display:block}

/* RIGHT PANEL */
.right-panel{width:var(--right-w);background:var(--w1);border-left:1px solid var(--w2);display:flex;flex-direction:column;padding:16px;overflow-y:auto;flex-shrink:0}

/* Basic Components */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;font-family:'Syne',sans-serif;overflow:hidden}
.av-xs{width:28px;height:28px;font-size:11px}
.av-sm{width:36px;height:36px;font-size:14px}
.av-md{width:44px;height:44px;font-size:17px}
.av-lg{width:64px;height:64px;font-size:24px}

.post-card{background:var(--w1);border:1px solid var(--w2);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.create-post{background:var(--w1);border:1px solid var(--w2);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.create-post-inner{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.create-post-input{flex:1;background:var(--w2);border:1px solid transparent;border-radius:50px;padding:10px 18px;color:var(--text2);font-size:14px;cursor:pointer}
.create-post-input:hover{border-color:var(--w4);color:var(--text1)}
.post-actions-bar{display:flex;gap:6px;border-top:1px solid var(--w2);padding-top:10px}
.post-action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;background:none;border:none;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;border-radius:8px;padding:8px;transition:var(--transition)}
.post-action-btn:hover{background:var(--w2);color:var(--text1)}

.post-header{display:flex;align-items:center;gap:12px;padding:14px 16px 10px}
.post-user{flex:1;min-width:0}
.post-name{font-weight:600;font-size:14px}
.post-meta{font-size:12px;color:var(--text3)}
.post-content{padding:0 16px 12px;font-size:15px;white-space:pre-wrap;word-break:break-word}
.post-media{width:100%;max-height:500px;object-fit:cover}
.post-footer{display:flex;border-top:1px solid var(--w2);margin:0 16px}
.footer-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:10px 8px;background:none;border:none;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition);border-radius:8px;margin:4px 0}
.footer-btn:hover{background:var(--w2);color:var(--text1)}
.footer-btn.liked{color:var(--accent2)}

.comment-section{padding:8px 16px 12px}
.comment-item{display:flex;gap:8px;margin-bottom:10px}
.comment-bubble{background:var(--w2);border-radius:12px;padding:8px 12px;flex:1}
.comment-author{font-weight:600;font-size:13px;margin-bottom:2px}
.comment-text{font-size:14px;word-break:break-word}
.comment-input-row{display:flex;align-items:center;gap:8px;margin-top:8px;border-top:1px solid var(--w2);padding-top:10px}
.comment-input{flex:1;background:var(--w2);border:none;border-radius:50px;padding:9px 16px;color:var(--text1);font-size:13px;outline:none}
.comment-submit{width:32px;height:32px;background:var(--accent);border:none;border-radius:50%;color:#fff;cursor:pointer;flex-shrink:0}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--w1);border:1px solid var(--w3);border-radius:var(--radius);width:min(95%,500px);max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--w2)}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--w2);border:none;color:var(--text1);font-size:18px;cursor:pointer}
.post-textarea{width:100%;background:none;border:none;color:var(--text1);font-size:16px;font-family:inherit;resize:none;min-height:120px;outline:none;padding:16px}
.btn-primary{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:600;font-size:15px;cursor:pointer;margin:16px;transition:var(--transition)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--w3);color:var(--text1);padding:10px 24px;border-radius:50px;font-size:14px;z-index:200;animation:toastIn 0.3s ease}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

.skeleton{background:linear-gradient(90deg,var(--w2) 25%,var(--w3) 50%,var(--w2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.empty-state{text-align:center;padding:40px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:0.5}

/* Responsive Adjustments */
@media (max-width: 768px) {
  :root { --nav-w: 100%; --right-w: 0; }
  #app { flex-direction: column-reverse; }
  .sidebar {
    flex-direction: row; justify-content: space-around; padding: 8px 0;
    border-right: none; border-top: 1px solid var(--w2);
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20; background: var(--w1);
    height: auto;
  }
  .sidebar-item { width: 40px; height: 40px; font-size: 20px; }
  .sidebar-avatar { margin-top: 0; }
  .main-panel { height: calc(100% - 70px); }
  .content-area { padding: 12px; }
  .right-panel { display: none; }
}
@media (max-width: 480px) {
  .content-area { padding: 8px; }
  .post-media { max-height: 300px; }
}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = "https://fghuggfaipwdtwpjsaon.supabase.co"
const SUPABASE_KEY = "sb_publishable_OnbXuVmC_wOD3fC3f2jo2A_u0Gjp6oi"
const STORAGE_BUCKET = "media"  // create this bucket in Supabase Storage

let sb, user, profile, likesSet = new Set()
let currentTab = 'feed'
let activeChatUser = null
let profileCache = {}
let selectedPostMedia = null

// ===================== INIT =====================
async function initApp() {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
  const { data: { session } } = await sb.auth.getSession()
  if (session?.user) {
    user = session.user
    await loadUserData()
    renderMainApp()
  } else {
    renderAuth()
  }

  sb.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      user = session.user
      await loadUserData()
      renderMainApp()
    } else {
      user = null; profile = null; likesSet.clear()
      renderAuth()
    }
  })
}

async function loadUserData() {
  // Profile
  const { data } = await sb.from('profiles').select('*').eq('id', user.id).single()
  profile = data || {
    id: user.id,
    username: user.user_metadata?.username || user.email?.split('@')[0] || 'User',
    full_name: user.user_metadata?.full_name || '',
    bio: '',
    avatar_url: null
  }
  // Likes
  const { data: likesData } = await sb.from('post_likes').select('post_id').eq('user_id', user.id)
  likesSet = new Set((likesData||[]).map(d => d.post_id))
}

async function getProfileById(userId) {
  if (profileCache[userId]) return profileCache[userId]
  const { data } = await sb.from('profiles').select('*').eq('id', userId).single()
  profileCache[userId] = data || { username: 'User', full_name: '', avatar_url: null }
  return profileCache[userId]
}

// ===================== AUTH =====================
function renderAuth() {
  document.getElementById('app').innerHTML = `
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--w);flex-direction:column;padding:20px">
    <h1 style="font-family:Syne;font-size:48px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:24px">WEEM</h1>
    <div style="background:var(--w1);border-radius:var(--radius);padding:32px;width:min(100%,400px)">
      <div id="auth-tabs" style="display:flex;gap:4px;background:var(--w2);border-radius:8px;padding:4px;margin-bottom:16px">
        <button class="auth-tab active" data-mode="login" style="flex:1;padding:10px;border-radius:6px;background:var(--accent);color:#fff;border:none;font-weight:600;cursor:pointer">Sign In</button>
        <button class="auth-tab" data-mode="signup" style="flex:1;padding:10px;border-radius:6px;background:none;color:var(--text2);border:none;font-weight:600;cursor:pointer">Sign Up</button>
      </div>
      <input id="auth-email" placeholder="Email" style="width:100%;padding:12px;background:var(--w2);border:1px solid var(--w3);border-radius:8px;color:var(--text1);outline:none;margin-bottom:12px">
      <input id="auth-pass" type="password" placeholder="Password" style="width:100%;padding:12px;background:var(--w2);border:1px solid var(--w3);border-radius:8px;color:var(--text1);outline:none;margin-bottom:12px">
      <input id="auth-name" placeholder="Full name" style="display:none;width:100%;padding:12px;background:var(--w2);border:1px solid var(--w3);border-radius:8px;color:var(--text1);outline:none;margin-bottom:12px">
      <div id="auth-err" style="color:var(--accent2);font-size:13px;margin-bottom:12px;display:none"></div>
      <button id="auth-btn" style="width:100%;padding:12px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer">Sign In</button>
    </div>
  </div>`

  document.querySelectorAll('.auth-tab').forEach(b => b.onclick = () => {
    document.querySelectorAll('.auth-tab').forEach(t => { t.classList.remove('active'); t.style.background='none'; t.style.color='var(--text2)' })
    b.classList.add('active'); b.style.background='var(--accent)'; b.style.color='#fff'
    document.getElementById('auth-name').style.display = b.dataset.mode==='signup'?'block':'none'
    document.getElementById('auth-btn').textContent = b.dataset.mode==='signup'?'Create Account':'Sign In'
  })

  document.getElementById('auth-btn').onclick = async () => {
    const mode = document.querySelector('.auth-tab.active').dataset.mode
    const email = document.getElementById('auth-email').value.trim()
    const password = document.getElementById('auth-pass').value
    const errEl = document.getElementById('auth-err')
    if(!email||!password) return showAuthErr(errEl,'Fill all fields')
    try {
      if(mode==='signup'){
        const name = document.getElementById('auth-name').value.trim()
        if(!name) return showAuthErr(errEl,'Full name required')
        const {data,error} = await sb.auth.signUp({email,password,options:{data:{full_name:name}}})
        if(error) throw error
        if(!data.session) showAuthErr(errEl,'Check your email to confirm',true)
      }else{
        const {error} = await sb.auth.signInWithPassword({email,password})
        if(error) throw error
      }
    } catch(e) { showAuthErr(errEl, e.message) }
  }
}

function showAuthErr(el, msg, isInfo=false) {
  el.style.display='block'; el.textContent=msg
  el.style.color = isInfo?'var(--accent3)':'var(--accent2)'
}

// ===================== MAIN LAYOUT =====================
function renderMainApp() {
  const avColor = strColor(user.email), initials = getInit(profile.username)
  document.getElementById('app').innerHTML = `
  <div class="sidebar" id="sidebar">
    <button class="sidebar-item active" data-tab="feed">🏠</button>
    <button class="sidebar-item" data-tab="search">🔍</button>
    <button class="sidebar-item" data-tab="reels">📺</button>
    <button class="sidebar-item" data-tab="chat">💬</button>
    <button class="sidebar-item" data-tab="groups">👥</button>
    <button class="sidebar-item" data-tab="market">🛒</button>
    <div class="sidebar-avatar avatar av-sm" style="background:${avColor}" onclick="switchTab('profile')">${initials}</div>
  </div>
  <div class="main-panel">
    <div class="content-area active" id="content-feed"></div>
    <div class="content-area" id="content-search"></div>
    <div class="content-area" id="content-reels"></div>
    <div class="content-area" id="content-chat"></div>
    <div class="content-area" id="content-groups"></div>
    <div class="content-area" id="content-market"></div>
    <div class="content-area" id="content-profile"></div>
  </div>
  <div class="right-panel" id="right-panel">
    <div id="right-content"></div>
  </div>
  <div id="modal-container"></div>
  <div id="toast-container"></div>`

  document.querySelectorAll('.sidebar-item[data-tab]').forEach(btn => {
    btn.onclick = () => switchTab(btn.dataset.tab)
  })
  switchTab('feed')
}

function switchTab(tab) {
  currentTab = tab
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'))
  document.querySelector(`.sidebar-item[data-tab="${tab}"]`)?.classList.add('active')
  document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active'))
  const contentEl = document.getElementById(`content-${tab}`)
  if(contentEl) contentEl.classList.add('active')
  updateRightPanelVisibility(tab)
  switch(tab) {
    case 'feed': renderFeed(); break;
    case 'search': renderSearch(); break;
    case 'reels': renderReels(); break;
    case 'chat': renderChatList(); break;
    case 'groups': renderGroups(); break;
    case 'market': renderMarket(); break;
    case 'profile': renderProfile(); break;
  }
}

function updateRightPanelVisibility(tab) {
  const panel = document.getElementById('right-panel')
  if (['chat','reels'].includes(tab)) panel.style.display='none'
  else panel.style.display='flex'
}

// ===================== FEED =====================
async function renderFeed() {
  const el = document.getElementById('content-feed')
  const avColor = strColor(user.email), initials = getInit(profile.username)
  el.innerHTML = `
  <div class="create-post">
    <div class="create-post-inner">
      <div class="avatar av-sm" style="background:${avColor}">${initials}</div>
      <div class="create-post-input" onclick="openPostModal()">What's on your mind?</div>
    </div>
    <div class="post-actions-bar">
      <label class="post-action-btn" style="cursor:pointer">📸 Photo/Video<input type="file" id="post-media-upload" accept="image/*,video/*" style="display:none" onchange="handlePostMediaSelect(event)"></label>
      <button class="post-action-btn" onclick="openPostModal()">😊 Feeling</button>
      <button class="post-action-btn" onclick="openPostModal()">📍 Check In</button>
    </div>
  </div>
  <div id="feed-posts"></div>`
  loadFeedPosts()
}

async function loadFeedPosts() {
  const container = document.getElementById('feed-posts')
  container.innerHTML = '<div class="skeleton" style="height:200px;margin-bottom:12px"></div>'
  const { data: posts } = await sb.from('posts').select('*').order('created_at',{ascending:false}).limit(20)
  if(!posts?.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📝</div><h3>No posts yet</h3></div>'
    return
  }
  const userIds = [...new Set(posts.map(p => p.user_id))]
  await Promise.all(userIds.map(id => getProfileById(id)))
  const enriched = await Promise.all(posts.map(async p => {
    const [{count:likeCount},{data:comments}] = await Promise.all([
      sb.from('post_likes').select('*',{count:'exact',head:true}).eq('post_id',p.id),
      sb.from('comments').select('*').eq('post_id',p.id).order('created_at',{ascending:true}).limit(3)
    ])
    const author = await getProfileById(p.user_id)
    return {...p, likes:likeCount||0, comments:comments||[], authorName: author.username || 'User'}
  }))
  container.innerHTML = enriched.map(p => renderPost(p)).join('')
}

function handlePostMediaSelect(event) {
  selectedPostMedia = event.target.files[0] || null
  if (selectedPostMedia) {
    openPostModal()
    document.getElementById('media-preview-name').textContent = selectedPostMedia.name
  }
}

function openPostModal() {
  const modal = document.getElementById('modal-container')
  modal.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header"><h3>Create Post</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
      <textarea class="post-textarea" id="post-textarea" placeholder="What's on your mind?"></textarea>
      <div id="media-preview-name" style="padding:0 16px 8px;color:var(--accent3);font-size:13px"></div>
      <button class="btn-primary" id="submit-post-btn" onclick="submitPost()">Post</button>
    </div></div>`
  if(selectedPostMedia) document.getElementById('media-preview-name').textContent = selectedPostMedia.name
}

async function submitPost() {
  const content = document.getElementById('post-textarea')?.value.trim() || ''
  const btn = document.getElementById('submit-post-btn')
  if(!content && !selectedPostMedia) return toast('Add some content')

  btn.disabled = true
  btn.textContent = 'Posting...'

  let mediaUrl = null
  if (selectedPostMedia) {
    try {
      const fileExt = selectedPostMedia.name.split('.').pop()
      const fileName = `${user.id}_${Date.now()}.${fileExt}`
      const { data, error } = await sb.storage.from(STORAGE_BUCKET).upload(fileName, selectedPostMedia)
      if (!error && data) {
        mediaUrl = `${SUPABASE_URL}/storage/v1/object/public/${STORAGE_BUCKET}/${fileName}`
      } else {
        toast('Upload failed, posting without media')
        mediaUrl = null
      }
    } catch (uploadErr) {
      toast('Upload service unavailable')
      mediaUrl = null
    }
  }

  const { error } = await sb.from('posts').insert({ user_id: user.id, content, media_url: mediaUrl })
  if (error) {
    toast('Post failed: ' + error.message)
  } else {
    toast('Posted!')
  }

  selectedPostMedia = null
  const fileInput = document.getElementById('post-media-upload')
  if(fileInput) fileInput.value = ''
  closeModal()
  if (currentTab === 'feed') loadFeedPosts()
  btn.disabled = false
  btn.textContent = 'Post'
}

function deletePost(postId) {
  if(confirm('Delete this post?')) {
    sb.from('posts').delete().eq('id', postId).eq('user_id', user.id)
    loadFeedPosts()
    toast('Post deleted')
  }
}

async function toggleLike(postId, liked) {
  if(liked) { await sb.from('post_likes').delete().eq('post_id',postId).eq('user_id',user.id); likesSet.delete(postId) }
  else { await sb.from('post_likes').insert({post_id:postId,user_id:user.id}); likesSet.add(postId) }
  loadFeedPosts()
}

async function addComment(postId) {
  const input = document.getElementById(`comment-input-${postId}`)
  const content = input?.value.trim()
  if(!content) return
  await sb.from('comments').insert({post_id:postId,user_id:user.id,content})
  input.value = ''
  loadFeedPosts()
}

function renderPost(post) {
  const isLiked = likesSet.has(post.id)
  const isOwn = post.user_id === user.id
  return `<div class="post-card">
    <div class="post-header">
      <div class="avatar av-sm" style="background:${strColor(post.user_id)}">${getInit(post.authorName)}</div>
      <div class="post-user"><div class="post-name">${esc(post.authorName)}</div><div class="post-meta">${timeAgo(post.created_at)}</div></div>
      ${isOwn ? `<button style="background:none;border:none;color:var(--text2);cursor:pointer" onclick="deletePost('${post.id}')">🗑️</button>` : ''}
    </div>
    ${post.content ? `<div class="post-content">${esc(post.content)}</div>` : ''}
    ${post.media_url ? (post.media_url.endsWith('.mp4')||post.media_url.endsWith('.mov') ? `<video controls src="${post.media_url}" class="post-media"></video>` : `<img src="${post.media_url}" class="post-media" alt="post media">`) : ''}
    <div class="post-footer">
      <button class="footer-btn ${isLiked?'liked':''}" onclick="toggleLike('${post.id}',${isLiked})">${isLiked?'❤️':'🤍'} Like</button>
      <button class="footer-btn" onclick="focusComment('${post.id}')">💬 Comment</button>
      <button class="footer-btn" onclick="sharePost('${post.id}')">↗️ Share</button>
    </div>
    <div class="comment-section" id="comments-${post.id}">
      ${(post.comments||[]).map(c => `<div class="comment-item"><div class="avatar av-xs" style="background:${strColor(c.user_id)}">${getInit('User')}</div><div class="comment-bubble"><div class="comment-author">User</div><div class="comment-text">${esc(c.content)}</div></div></div>`).join('')}
      <div class="comment-input-row">
        <div class="avatar av-xs" style="background:${strColor(user.email)}">${getInit(profile.username)}</div>
        <input class="comment-input" id="comment-input-${post.id}" placeholder="Write a comment..." onkeypress="if(event.key==='Enter')addComment('${post.id}')">
        <button class="comment-submit" onclick="addComment('${post.id}')">➤</button>
      </div>
    </div>
  </div>`
}

// ===================== SEARCH =====================
async function renderSearch() {
  document.getElementById('content-search').innerHTML = `
    <input type="text" id="search-input" placeholder="Search users..." style="width:100%;padding:12px;background:var(--w2);border:1px solid var(--w3);border-radius:50px;color:var(--text1);outline:none;margin-bottom:16px" oninput="performSearch()">
    <div id="search-results"></div>`
}

async function performSearch() {
  const q = document.getElementById('search-input').value.trim()
  if(!q) { document.getElementById('search-results').innerHTML = ''; return }
  document.getElementById('search-results').innerHTML = '<div class="skeleton" style="height:60px;margin-bottom:8px"></div>'
  const { data: users } = await sb.from('profiles').select('*').ilike('username', `%${q}%`).limit(10)
  if(!users?.length) { document.getElementById('search-results').innerHTML = '<div class="empty-state"><p>No users found</p></div>'; return }
  document.getElementById('search-results').innerHTML = users.map(u => `
    <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--w1);border-radius:var(--radius);margin-bottom:8px">
      <div class="avatar av-sm" style="background:${strColor(u.id)}">${getInit(u.username)}</div>
      <div style="flex:1"><div style="font-weight:600">${esc(u.full_name||u.username)}</div><div style="font-size:13px;color:var(--text2)">@${esc(u.username)}</div></div>
      <button class="btn-primary" style="width:auto;padding:6px 14px;margin:0" onclick="sendFriendRequest('${u.id}')">Add Friend</button>
    </div>`).join('')
}

async function sendFriendRequest(friendId) {
  const { error } = await sb.from('friendships').insert({ user_id: user.id, friend_id: friendId, status: 'pending' })
  if(error) return toast('Request already sent')
  toast('Friend request sent!')
}

// ===================== REELS =====================
async function renderReels() {
  document.getElementById('content-reels').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h3 style="font-family:Syne">Reels</h3>
      <button class="btn-primary" style="width:auto;padding:8px 16px;margin:0" onclick="showUploadReelModal()">+ Upload Reel</button>
    </div>
    <div id="reels-container" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px"></div>`
  loadReels()
}

async function loadReels() {
  const container = document.getElementById('reels-container')
  container.innerHTML = '<div class="skeleton" style="height:200px;grid-column:span 2"></div>'
  const { data: reels } = await sb.from('reels').select('*').order('created_at',{ascending:false}).limit(30)
  if(!reels?.length) { container.innerHTML = '<div class="empty-state"><div class="icon">📺</div><h3>No reels yet</h3></div>'; return }
  container.innerHTML = reels.map(r => `
    <div style="position:relative;border-radius:12px;overflow:hidden;background:var(--w1);cursor:pointer;aspect-ratio:9/16" onclick="playReel('${r.video_url}')">
      <video src="${r.video_url}" style="width:100%;height:100%;object-fit:cover" muted loop></video>
      <div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.7));padding:12px;color:#fff">
        <div style="font-size:13px;font-weight:600">@${esc(r.username||'User')}</div>
        <div style="font-size:12px;color:#ddd">${esc(r.caption)}</div>
      </div>
    </div>`).join('')
}

function showUploadReelModal() {
  const modal = document.getElementById('modal-container')
  modal.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header"><h3>Upload Reel</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
      <input type="file" id="reel-file" accept="video/*" style="margin:16px">
      <input type="text" id="reel-caption" placeholder="Caption" style="width:90%;margin:0 16px 16px;padding:12px;background:var(--w2);border:1px solid var(--w3);border-radius:8px;color:var(--text1);outline:none">
      <button class="btn-primary" onclick="uploadReel()">Upload</button>
    </div></div>`
}

async function uploadReel() {
  const file = document.getElementById('reel-file').files[0]
  const caption = document.getElementById('reel-caption').value.trim()
  if(!file) return toast('Select a video')
  try {
    const fileName = `reel_${user.id}_${Date.now()}.mp4`
    const { data, error } = await sb.storage.from(STORAGE_BUCKET).upload(fileName, file)
    if(error) throw error
    const videoUrl = `${SUPABASE_URL}/storage/v1/object/public/${STORAGE_BUCKET}/${fileName}`
    await sb.from('reels').insert({ user_id: user.id, video_url: videoUrl, caption })
    closeModal()
    toast('Reel uploaded!')
    loadReels()
  } catch(e) { toast('Upload failed') }
}

function playReel(url) { window.open(url, '_blank') }

// ===================== CHAT =====================
async function renderChatList() {
  const el = document.getElementById('content-chat')
  el.innerHTML = '<div class="skeleton" style="height:500px"></div>'
  const { data: conversations } = await sb.from('messages').select('*').or(`sender_id.eq.${user.id},receiver_id.eq.${user.id}`).order('created_at',{ascending:false})
  const convMap = {}
  if(conversations) for(const m of conversations) {
    const other = m.sender_id===user.id ? m.receiver_id : m.sender_id
    if(!convMap[other]) convMap[other]=[]
    convMap[other].push(m)
  }
  const list = await Promise.all(Object.entries(convMap).map(async ([otherId,msgs]) => {
    const other = await getProfileById(otherId)
    const last = msgs[msgs.length-1]
    return { otherId, name: other.username, lastMsg: last.content, time: last.created_at }
  }))
  if(!list.length) { el.innerHTML = '<div class="empty-state"><div class="icon">💬</div><h3>No conversations</h3></div>'; return }
  el.innerHTML = list.map(c => `
    <div style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;cursor:pointer;background:var(--w1);border:1px solid var(--w2);margin-bottom:4px" onclick="openChat('${c.otherId}','${esc(c.name)}')">
      <div class="avatar av-sm" style="background:${strColor(c.otherId)}">${getInit(c.name)}</div>
      <div style="flex:1"><div style="font-weight:600">${esc(c.name)}</div><div style="font-size:13px;color:var(--text2)">${esc(c.lastMsg)}</div></div>
      <div style="font-size:11px;color:var(--text3)">${timeAgo(c.time)}</div>
    </div>`).join('')
}

async function openChat(otherId, otherName) {
  activeChatUser = otherId
  const el = document.getElementById('content-chat')
  el.innerHTML = `<div style="display:flex;flex-direction:column;height:100%">
    <div style="display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--w2);background:var(--w1)">
      <button onclick="switchTab('chat')" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer">←</button>
      <div class="avatar av-sm" style="background:${strColor(otherId)}">${getInit(otherName)}</div>
      <div style="font-weight:600">${esc(otherName)}</div>
    </div>
    <div id="chat-messages" style="flex:1;overflow-y:auto;padding:16px"></div>
    <div style="display:flex;gap:8px;padding:12px;border-top:1px solid var(--w2)">
      <input id="chat-input" style="flex:1;background:var(--w2);border:none;border-radius:50px;padding:10px 16px;color:var(--text1);outline:none" placeholder="Message..." onkeypress="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()" style="background:var(--accent);border:none;border-radius:50%;width:36px;height:36px;color:#fff;cursor:pointer">➤</button>
    </div>
  </div>`
  loadChatMessages(otherId)
}

async function loadChatMessages(otherId) {
  const { data } = await sb.from('messages').select('*').or(`sender_id.eq.${user.id},sender_id.eq.${otherId}`).or(`receiver_id.eq.${user.id},receiver_id.eq.${otherId}`).order('created_at')
  const container = document.getElementById('chat-messages')
  if(!data?.length) { container.innerHTML = '<p style="text-align:center;color:var(--text3)">No messages yet</p>'; return }
  container.innerHTML = data.map(m => {
    const sent = m.sender_id===user.id
    return `<div style="display:flex;justify-content:${sent?'flex-end':'flex-start'};margin-bottom:8px">
      <div style="max-width:70%;padding:10px 14px;border-radius:18px;background:${sent?'var(--accent)':'var(--w2)'};color:${sent?'#fff':'var(--text1)'}">${esc(m.content)}</div>
    </div>`
  }).join('')
  container.scrollTop = container.scrollHeight
}

async function sendMessage() {
  const input = document.getElementById('chat-input')
  const content = input?.value.trim()
  if(!content||!activeChatUser) return
  input.value = ''
  await sb.from('messages').insert({ sender_id: user.id, receiver_id: activeChatUser, content })
  loadChatMessages(activeChatUser)
}

// ===================== GROUPS / MARKET =====================
async function renderGroups() {
  const el = document.getElementById('content-groups')
  const { data: groups } = await sb.from('groups_table').select('*').order('members_count',{ascending:false})
  if(!groups?.length) { el.innerHTML = '<div class="empty-state"><div class="icon">👥</div><h3>No groups yet</h3><button class="btn-primary" style="width:auto;margin-top:16px" onclick="createGroup()">Create Group</button></div>'; return }
  el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">${groups.map(g => `
    <div style="background:var(--w1);border-radius:var(--radius);padding:16px;border:1px solid var(--w2);cursor:pointer" onclick="joinGroup('${g.id}')">
      <div style="font-size:40px;text-align:center">👥</div>
      <div style="font-weight:700;margin-top:8px">${esc(g.name)}</div>
    </div>`).join('')}</div>`
}

async function createGroup() {
  const name = prompt('Group name:')
  if(!name) return
  await sb.from('groups_table').insert({name,created_by:user.id,members_count:1})
  renderGroups()
}

async function joinGroup(groupId) {
  await sb.from('group_members').insert({group_id:groupId,user_id:user.id})
  toast('Joined!')
}

async function renderMarket() {
  const el = document.getElementById('content-market')
  const { data: items } = await sb.from('marketplace_items').select('*').order('created_at',{ascending:false})
  if(!items?.length) { el.innerHTML = '<div class="empty-state"><div class="icon">🛒</div><h3>No items listed</h3><button class="btn-primary" style="width:auto;margin-top:16px" onclick="createMarketItem()">Sell Item</button></div>'; return }
  el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px">${items.map(i => `
    <div style="background:var(--w1);border-radius:var(--radius);overflow:hidden;border:1px solid var(--w2)">
      <div style="height:120px;background:var(--w2);display:flex;align-items:center;justify-content:center;font-size:32px">🛍️</div>
      <div style="padding:12px"><div style="font-weight:600">${esc(i.name)}</div><div style="color:var(--accent3);font-weight:700">${esc(i.price)}</div></div>
    </div>`).join('')}</div>`
}

async function createMarketItem() {
  const name = prompt('Item name:')
  const price = prompt('Price:')
  if(!name) return
  await sb.from('marketplace_items').insert({name,price:price||'',user_id:user.id})
  renderMarket()
}

// ===================== PROFILE =====================
async function renderProfile() {
  const el = document.getElementById('content-profile')
  const avColor = strColor(user.email), initials = getInit(profile.username)
  const { count } = await sb.from('posts').select('*',{count:'exact',head:true}).eq('user_id',user.id)
  const { data: userPosts } = await sb.from('posts').select('*').eq('user_id',user.id).order('created_at',{ascending:false}).limit(10)
  el.innerHTML = `
  <div style="background:var(--w1);border-radius:var(--radius);padding:24px;border:1px solid var(--w2);margin-bottom:20px">
    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
      <div class="avatar av-lg" style="background:${avColor}">${initials}</div>
      <div style="flex:1">
        <h2 style="font-family:Syne">${esc(profile.full_name||profile.username)}</h2>
        <p style="color:var(--text2)">@${esc(profile.username)}</p>
        <p style="margin-top:8px">${esc(profile.bio||'No bio yet')}</p>
        <div style="margin-top:12px"><strong>${count||0}</strong> posts</div>
      </div>
      <button class="btn-primary" style="width:auto;padding:8px 16px;margin:0" onclick="editProfile()">✏️ Edit Profile</button>
      <button class="btn-primary" style="width:auto;padding:8px 16px;margin:0;background:var(--w3)" onclick="logoutUser()">🚪 Logout</button>
    </div>
  </div>
  <div id="profile-posts">${(userPosts||[]).map(p => renderPost({...p, likes:0, comments:[], authorName:profile.username})).join('')||'<div class="empty-state"><p>No posts</p></div>'}</div>`
}

function editProfile() {
  const modal = document.getElementById('modal-container')
  modal.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="width:min(95%,400px)">
      <div class="modal-header"><h3>Edit Profile</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div style="padding:16px;display:flex;flex-direction:column;gap:12px">
        <input id="edit-name" style="padding:10px;background:var(--w2);border:1px solid var(--w3);border-radius:8px;color:var(--text1)" value="${esc(profile.full_name||'')}" placeholder="Full Name">
        <input id="edit-username" style="padding:10px;background:var(--w2);border:1px solid var(--w3);border-radius:8px;color:var(--text1)" value="${esc(profile.username||'')}" placeholder="Username">
        <textarea id="edit-bio" style="padding:10px;background:var(--w2);border:1px solid var(--w3);border-radius:8px;color:var(--text1);resize:vertical" rows="3" placeholder="Bio">${esc(profile.bio||'')}</textarea>
        <button class="btn-primary" onclick="saveProfile()">Save Changes</button>
      </div>
    </div></div>`
}

async function saveProfile() {
  const fullName = document.getElementById('edit-name').value.trim()
  const username = document.getElementById('edit-username').value.trim()
  const bio = document.getElementById('edit-bio').value.trim()
  if(!username) return toast('Username required')
  const { error } = await sb.from('profiles').upsert({ id: user.id, full_name: fullName, username, bio, updated_at: new Date() })
  if(error) return toast('Save failed')
  profile.full_name = fullName; profile.username = username; profile.bio = bio
  closeModal()
  renderProfile()
}

function logoutUser() { sb.auth.signOut() }

// ===================== UTILS =====================
function toast(msg) {
  const el = document.getElementById('toast-container')
  el.innerHTML = `<div class="toast">${msg}</div>`
  setTimeout(() => el.innerHTML='', 2500)
}
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML }
function getInit(s) { return (s||'U')[0].toUpperCase() }
function strColor(s) {
  let h=0; for(let i=0;i<(s||'').length;i++) h=s.charCodeAt(i)+((h<<5)-h)
  return ['#7C5CFC','#FF4D8D','#00D4AA','#FFB443','#FF6B35','#6C5CE7'][Math.abs(h)%6]
}
function timeAgo(d) {
  if(!d) return ''
  const diff = Math.floor((Date.now()-new Date(d).getTime())/60000)
  if(diff<1) return 'Now'; if(diff<60) return diff+'m'; if(diff<1440) return Math.floor(diff/60)+'h'; return Math.floor(diff/1440)+'d'
}
function closeModal() { document.getElementById('modal-container').innerHTML = '' }

initApp()
</script>
