<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>by WEEM - Test</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; text-align: center; padding: 50px 20px; }
        .card { background: white; max-width: 400px; margin: 20px auto; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .logo { font-size: 28px; font-weight: bold; margin-bottom: 20px; }
        .logo span { color: #0066cc; }
        .status { padding: 10px; border-radius: 8px; margin: 10px 0; }
        .green { background: #d4edda; color: #155724; }
        .red { background: #f8d7da; color: #721c24; }
        .yellow { background: #fff3cd; color: #856404; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { background: #0066cc; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="logo"><span>by</span> WEEM</div>
    <div class="card">
        <h2>Diagnostic Test</h2>
        <div id="status1" class="status yellow">⏳ Checking HTML...</div>
        <div id="status2" class="status yellow">⏳ Checking Supabase...</div>
        <div id="status3" class="status yellow">⏳ Checking Connection...</div>
        <div id="formArea"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // STEP 1: HTML is working
        document.getElementById('status1').className = 'status green'
        document.getElementById('status1').textContent = '✅ HTML is working!'
        console.log('✅ HTML loaded')

        // STEP 2: Check if Supabase loaded
        setTimeout(() => {
            if (typeof window.supabase !== 'undefined') {
                document.getElementById('status2').className = 'status green'
                document.getElementById('status2').textContent = '✅ Supabase library loaded!'
                console.log('✅ Supabase loaded')
                
                // Step 3: Test connection
                testConnection()
            } else {
                document.getElementById('status2').className = 'status red'
                document.getElementById('status2').textContent = '❌ Supabase library FAILED to load. Check internet.'
                console.log('❌ Supabase not found')
            }
        }, 2000)

        async function testConnection() {
            // REPLACE THESE WITH YOUR ACTUAL KEYS
            const SUPABASE_URL = 'https://your-project.supabase.co'
            const SUPABASE_KEY = 'your-anon-key'
            
            try {
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
                
                // Test: Get user (will be null if not logged in)
                const { data, error } = await supabase.auth.getUser()
                
                if (error && error.message.includes('Invalid')) {
                    document.getElementById('status3').className = 'status red'
                    document.getElementById('status3').textContent = '❌ Invalid API keys. Please check SUPABASE_URL and SUPABASE_KEY'
                } else {
                    document.getElementById('status3').className = 'status green'
                    document.getElementById('status3').textContent = '✅ Connected to Supabase!'
                    
                    if (data.user) {
                        showLoggedIn(data.user)
                    } else {
                        showLoginForm()
                    }
                }
            } catch (e) {
                document.getElementById('status3').className = 'status red'
                document.getElementById('status3').textContent = '❌ Error: ' + e.message
            }
        }

        function showLoginForm() {
            document.getElementById('formArea').innerHTML = `
                <h3 style="margin-top:20px;">Supabase is working!</h3>
                <p style="color:#666;">Now update the keys in your code and refresh.</p>
                <input type="email" placeholder="Email" id="email">
                <input type="password" placeholder="Password" id="password">
                <button onclick="alert('This is just a test. Deploy the full version!')">Test Login</button>
            `
        }

        function showLoggedIn(user) {
            document.getElementById('formArea').innerHTML = `
                <h3 style="margin-top:20px;">Already logged in!</h3>
                <p style="color:#666;">User: ${user.email}</p>
            `
        }
    </script>
</body>
</html>
