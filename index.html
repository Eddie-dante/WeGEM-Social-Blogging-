<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>WEEM — Full Experience</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #080810;
  --s1:    #0E0E1A;
  --s2:    #141420;
  --s3:    #1C1C2C;
  --s4:    #242438;
  --s5:    #2E2E46;
  --a1:    #7B61FF;
  --a2:    #FF4F8B;
  --a3:    #00CBA8;
  --a4:    #FFB300;
  --t1:    #EEEEFF;
  --t2:    #9090B8;
  --t3:    #50507A;
  --r:     14px;
  --r-sm:  8px;
  --r-lg:  20px;
  --nav:   66px;
  --trans: 0.18s cubic-bezier(0.4,0,0.2,1);
  --sh:    0 4px 24px rgba(0,0,0,.5);
  --sh-sm: 0 2px 8px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);line-height:1.5;overflow:hidden}
button{font-family:'DM Sans',sans-serif}
input,textarea{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:4px}

/* ──── ROOT LAYOUT ──── */
#app{display:flex;height:100%;width:100%}

/* ──── SIDEBAR ──── */
.sidebar{
  width:var(--nav);flex-shrink:0;
  background:var(--s1);
  border-right:1px solid var(--s3);
  display:flex;flex-direction:column;align-items:center;
  padding:16px 0;gap:6px;z-index:30;height:100%;
}
.s-logo{
  font-family:'Syne',sans-serif;font-size:20px;font-weight:800;
  background:linear-gradient(135deg,var(--a1),var(--a2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:10px;letter-spacing:-1px;cursor:pointer;
}
.s-btn{
  width:46px;height:46px;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:var(--t3);
  border:none;background:none;cursor:pointer;
  transition:var(--trans);position:relative;
}
.s-btn:hover{background:var(--s3);color:var(--t1)}
.s-btn.active{background:rgba(123,97,255,.15);color:var(--a1)}
.s-btn.active::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:24px;background:var(--a1);border-radius:0 3px 3px 0;
}
.s-spacer{flex:1}
.s-badge{
  position:absolute;top:6px;right:6px;
  min-width:16px;height:16px;padding:0 3px;
  background:var(--a2);color:#fff;
  font-size:10px;font-weight:700;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
}
.s-avatar{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:700;color:#fff;
  cursor:pointer;font-size:14px;border:2px solid var(--s4);
  transition:var(--trans);flex-shrink:0;
}
.s-avatar:hover{border-color:var(--a1)}

/* ──── MAIN ──── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.page{flex:1;overflow-y:auto;padding:20px;display:none;animation:pageIn .2s ease}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ──── RIGHT PANEL ──── */
.rpanel{
  width:290px;flex-shrink:0;
  background:var(--s1);border-left:1px solid var(--s3);
  padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;
}
.rp-section-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

/* ──── COMMON ──── */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.av-xs{width:28px;height:28px;font-size:11px}
.av-sm{width:36px;height:36px;font-size:14px}
.av-md{width:44px;height:44px;font-size:17px}
.av-lg{width:68px;height:68px;font-size:26px}
.av-xl{width:100px;height:100px;font-size:36px}

/* ──── CARDS ──── */
.card{background:var(--s1);border:1px solid var(--s3);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.card-p{padding:16px}

/* ──── FORM ELEMENTS ──── */
.f-input{
  width:100%;padding:11px 14px;
  background:var(--s2);border:1px solid var(--s4);border-radius:var(--r-sm);
  color:var(--t1);font-size:14px;outline:none;transition:var(--trans);
}
.f-input:focus{border-color:var(--a1);background:var(--s3)}
.f-input::placeholder{color:var(--t3)}

.f-textarea{
  width:100%;padding:12px 14px;
  background:transparent;border:none;
  color:var(--t1);font-size:15px;outline:none;resize:none;line-height:1.6;
}
.f-textarea::placeholder{color:var(--t3)}

/* ──── BUTTONS ──── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;cursor:pointer;font-weight:600;transition:var(--trans);border-radius:var(--r-sm);font-size:14px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--a1);color:#fff;padding:10px 18px}
.btn-primary:hover:not(:disabled){background:#6a50ef}
.btn-secondary{background:var(--s3);color:var(--t1);padding:10px 18px;border:1px solid var(--s4)}
.btn-secondary:hover:not(:disabled){background:var(--s4)}
.btn-ghost{background:none;color:var(--t2);padding:8px 12px}
.btn-ghost:hover{background:var(--s3);color:var(--t1)}
.btn-danger{background:rgba(255,79,139,.12);color:var(--a2);border:1px solid rgba(255,79,139,.25);padding:10px 18px}
.btn-danger:hover{background:rgba(255,79,139,.2)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-icon{width:36px;height:36px;padding:0;border-radius:50%;background:var(--s3);color:var(--t2);border:none;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:var(--trans)}
.btn-icon:hover{background:var(--s4);color:var(--t1)}
.btn-full{width:100%}

/* ──── POST CARD ──── */
.post-card{background:var(--s1);border:1px solid var(--s3);border-radius:var(--r);margin-bottom:12px;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.post-hd{display:flex;align-items:center;gap:10px;padding:14px 16px 10px}
.post-user{flex:1;min-width:0}
.post-name{font-weight:600;font-size:14px;cursor:pointer}
.post-name:hover{color:var(--a1)}
.post-meta{font-size:12px;color:var(--t3);margin-top:1px}
.post-body{padding:2px 16px 12px;font-size:15px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.post-body.big{font-size:20px;font-weight:500}
.post-media{width:100%;max-height:520px;object-fit:cover;display:block}
.post-video{width:100%;max-height:520px;object-fit:cover;display:block;background:#000}
.post-stats{display:flex;justify-content:space-between;padding:6px 16px;font-size:13px;color:var(--t3)}
.post-actions{display:flex;border-top:1px solid var(--s3);margin:0 16px}
.paction{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 8px;background:none;border:none;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;border-radius:var(--r-sm);transition:var(--trans);margin:4px 0}
.paction:hover{background:var(--s3);color:var(--t1)}
.paction.liked{color:var(--a2)}
.comment-wrap{padding:8px 16px 12px}
.cmt{display:flex;gap:8px;margin-bottom:10px}
.cmt-bubble{background:var(--s2);border-radius:12px;padding:8px 12px;flex:1;min-width:0}
.cmt-author{font-weight:600;font-size:12px;margin-bottom:2px}
.cmt-text{font-size:13px;word-break:break-word;color:var(--t1)}
.cmt-input-row{display:flex;align-items:center;gap:8px;border-top:1px solid var(--s3);padding-top:10px;margin-top:6px}
.cmt-input{flex:1;background:var(--s2);border:none;border-radius:50px;padding:9px 16px;color:var(--t1);font-size:13px;outline:none;min-width:0}
.cmt-input:focus{background:var(--s3)}
.cmt-input::placeholder{color:var(--t3)}
.cmt-send{width:32px;height:32px;border-radius:50%;background:var(--a1);border:none;color:#fff;font-size:14px;cursor:pointer;flex-shrink:0;transition:var(--trans)}
.cmt-send:hover{background:#6a50ef}

/* ──── CREATE POST ──── */
.cp-card{background:var(--s1);border:1px solid var(--s3);border-radius:var(--r);padding:14px;margin-bottom:14px}
.cp-top{display:flex;align-items:center;gap:10px}
.cp-trigger{flex:1;background:var(--s2);border-radius:50px;padding:10px 18px;color:var(--t3);font-size:14px;cursor:pointer;border:1px solid transparent;transition:var(--trans);user-select:none}
.cp-trigger:hover{border-color:var(--s5);color:var(--t1)}
.cp-btns{display:flex;gap:4px;border-top:1px solid var(--s3);padding-top:10px;margin-top:12px}
.cp-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:8px;background:none;border:none;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;border-radius:var(--r-sm);transition:var(--trans)}
.cp-btn:hover{background:var(--s3);color:var(--t1)}

/* ──── STORIES ──── */
.stories-row{display:flex;gap:10px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px;scrollbar-width:none}
.stories-row::-webkit-scrollbar{display:none}
.story-card{flex-shrink:0;width:88px;border-radius:12px;overflow:hidden;cursor:pointer;position:relative;transition:transform .2s}
.story-card:hover{transform:scale(1.04)}
.story-inner{height:130px;background:var(--s3);position:relative;display:flex;align-items:flex-start;padding:8px}
.story-inner img,.story-inner video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.story-inner-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.15) 0%,rgba(0,0,0,.55) 100%)}
.story-av{position:relative;z-index:1;border:2px solid var(--a1);border-radius:50%}
.story-add-story{height:130px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:28px;position:relative}
.story-plus{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:24px;height:24px;border-radius:50%;background:var(--a1);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:300;border:2px solid var(--s1)}
.story-footer{background:var(--s2);padding:8px 6px;font-size:11px;font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.story-add-footer{background:var(--s2);padding:8px 6px;font-size:11px;text-align:center}
.story-name{position:absolute;bottom:8px;left:0;right:0;z-index:1;text-align:center;font-size:11px;font-weight:600;color:#fff;padding:0 4px;text-shadow:0 1px 3px rgba(0,0,0,.5)}

/* ──── MODAL ──── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px);animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--s1);border:1px solid var(--s4);border-radius:var(--r-lg);width:min(96%,540px);max-height:92vh;overflow-y:auto;box-shadow:var(--sh);animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--s3)}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}
.modal-close{width:30px;height:30px;border-radius:50%;background:var(--s3);border:none;color:var(--t1);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ──── COMPOSER ──── */
.composer-user{display:flex;align-items:center;gap:10px;padding:16px 20px 10px}
.composer-name{font-weight:600;font-size:14px}
.composer-textarea{width:100%;min-height:110px;padding:4px 20px 16px;background:transparent;border:none;color:var(--t1);font-size:17px;outline:none;resize:none;line-height:1.6}
.composer-textarea::placeholder{color:var(--t3)}
.composer-media-preview{margin:0 20px 12px;position:relative;border-radius:var(--r-sm);overflow:hidden}
.composer-media-preview img,.composer-media-preview video{max-height:220px;width:100%;object-fit:cover;display:block}
.remove-media{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.composer-toolbar{display:flex;align-items:center;gap:6px;padding:10px 20px;background:var(--s2);border-radius:var(--r-sm);margin:0 20px 12px}
.composer-toolbar span{font-size:13px;font-weight:600;flex:1;color:var(--t2)}
.toolbar-btn{width:34px;height:34px;border-radius:50%;background:none;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--trans)}
.toolbar-btn:hover{background:var(--s3)}
.composer-footer{padding:12px 20px;border-top:1px solid var(--s3)}

/* ──── STORY VIEWER ──── */
.sv-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:flex;align-items:center;justify-content:center}
.sv-inner{position:relative;width:min(400px,100%);height:min(720px,100vh);border-radius:var(--r-lg);overflow:hidden;background:var(--s2)}
.sv-progress{position:absolute;top:10px;left:10px;right:10px;display:flex;gap:3px;z-index:2}
.sv-seg{flex:1;height:3px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden}
.sv-fill{height:100%;background:#fff;border-radius:2px;animation:svProgress 5s linear forwards}
@keyframes svProgress{from{width:0}to{width:100%}}
.sv-hd{position:absolute;top:22px;left:12px;right:12px;display:flex;align-items:center;gap:8px;z-index:2}
.sv-close{position:absolute;top:12px;right:12px;z-index:3;background:rgba(255,255,255,.1);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sv-close:hover{background:rgba(255,255,255,.2)}
.sv-content{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.sv-content img,.sv-content video{width:100%;height:100%;object-fit:cover}
.sv-caption{position:absolute;bottom:16px;left:12px;right:12px;color:#fff;font-size:14px;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,.6);z-index:2}

/* ──── SEARCH ──── */
.search-bar-wrap{position:relative;margin-bottom:16px}
.search-bar-wrap span{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:16px}
.search-bar{padding-left:40px}

/* ──── REELS GRID ──── */
.reels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.reel-card{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:9/16;background:var(--s3);cursor:pointer;transition:transform .2s}
.reel-card:hover{transform:scale(1.03)}
.reel-card video,.reel-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.reel-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(0,0,0,.75))}
.reel-info{position:absolute;bottom:0;left:0;right:0;padding:10px}
.reel-stats{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:10px}
.reel-stat{display:flex;flex-direction:column;align-items:center;color:#fff;font-size:11px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.reel-username{font-size:12px;font-weight:600;color:#fff;margin-bottom:2px}
.reel-caption{font-size:11px;color:rgba(255,255,255,.8);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.reel-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:40px;opacity:.7;z-index:1}

/* ──── CHAT ──── */
.chat-layout{display:flex;height:100%;overflow:hidden}
.conv-list-panel{width:300px;flex-shrink:0;border-right:1px solid var(--s3);display:flex;flex-direction:column}
.conv-hd{padding:14px 16px;border-bottom:1px solid var(--s3)}
.conv-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:10px}
.conv-list{flex:1;overflow-y:auto}
.conv-item{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;transition:var(--trans);border-radius:var(--r-sm);margin:2px 8px}
.conv-item:hover{background:var(--s2)}
.conv-item.active{background:rgba(123,97,255,.12)}
.conv-name{font-size:14px;font-weight:600;display:flex;justify-content:space-between}
.conv-last{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.conv-time{font-size:11px;color:var(--t3)}
.conv-unread{min-width:18px;height:18px;background:var(--a1);color:#fff;font-size:10px;font-weight:700;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0}
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);gap:8px}
.chat-hd{padding:12px 16px;border-bottom:1px solid var(--s3);background:var(--s1);display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-hd-info{flex:1}
.chat-hd-name{font-weight:700;font-size:15px}
.chat-hd-status{font-size:12px;color:var(--a3)}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px}
.msg{display:flex;flex-direction:column}
.msg.sent{align-items:flex-end}
.msg.recv{align-items:flex-start}
.msg-bubble{max-width:70%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word}
.msg.sent .msg-bubble{background:var(--a1);color:#fff;border-bottom-right-radius:4px}
.msg.recv .msg-bubble{background:var(--s3);color:var(--t1);border-bottom-left-radius:4px}
.msg-meta{font-size:11px;color:var(--t3);padding:2px 4px}
.day-divider{text-align:center;font-size:12px;color:var(--t3);margin:8px 0;position:relative}
.day-divider::before,.day-divider::after{content:'';position:absolute;top:50%;width:calc(50% - 50px);height:1px;background:var(--s3)}
.day-divider::before{left:0}
.day-divider::after{right:0}
.chat-input-area{display:flex;align-items:flex-end;gap:8px;padding:12px 16px;border-top:1px solid var(--s3);background:var(--s1);flex-shrink:0}
.chat-input-wrap{flex:1;background:var(--s2);border-radius:22px;padding:10px 14px;display:flex;align-items:flex-end;gap:6px}
.chat-input{flex:1;background:none;border:none;color:var(--t1);font-size:14px;outline:none;resize:none;max-height:120px;line-height:1.4}
.chat-input::placeholder{color:var(--t3)}
.chat-send{width:40px;height:40px;border-radius:50%;background:var(--a1);border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;transition:var(--trans);display:flex;align-items:center;justify-content:center}
.chat-send:hover{background:#6a50ef}
.chat-send:disabled{opacity:.35;cursor:not-allowed}

/* ──── GROUPS ──── */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.group-card{background:var(--s1);border:1px solid var(--s3);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s}
.group-card:hover{border-color:var(--a1);transform:translateY(-2px)}
.group-cover{height:90px;display:flex;align-items:center;justify-content:center;font-size:36px}
.group-body{padding:12px}
.group-name{font-weight:700;font-size:14px;margin-bottom:3px}
.group-meta{font-size:12px;color:var(--t3)}

/* ──── MARKETPLACE ──── */
.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.market-card{background:var(--s1);border:1px solid var(--s3);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s}
.market-card:hover{border-color:var(--a1);transform:translateY(-2px)}
.market-img{height:140px;background:var(--s3);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.market-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.market-img-placeholder{font-size:44px;opacity:.5}
.market-body{padding:10px}
.market-price{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--a3);margin-bottom:2px}
.market-name{font-size:13px;font-weight:500;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.market-loc{font-size:11px;color:var(--t3);margin-top:2px}

/* ──── PROFILE ──── */
.profile-cover{height:180px;background:linear-gradient(135deg,#667eea,#764ba2,var(--a2));border-radius:var(--r) var(--r) 0 0;position:relative}
.profile-info-card{background:var(--s1);border:1px solid var(--s3);border-radius:0 0 var(--r) var(--r);padding:0 20px 20px;margin-bottom:16px}
.profile-av-row{display:flex;align-items:flex-end;gap:14px;margin-top:-40px;margin-bottom:12px}
.profile-av-ring{border:4px solid var(--s1);border-radius:50%;flex-shrink:0}
.profile-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:2px}
.profile-handle{font-size:13px;color:var(--t2);margin-bottom:8px}
.profile-bio{font-size:14px;color:var(--t2);margin-bottom:14px;line-height:1.5}
.profile-stats{display:flex;gap:20px;margin-bottom:14px}
.pstat-num{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
.pstat-lbl{font-size:12px;color:var(--t3)}
.profile-actions{display:flex;gap:8px;flex-wrap:wrap}

/* ──── SKELETON ──── */
.skel{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ──── TOAST ──── */
#toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast{background:var(--s4);color:var(--t1);padding:10px 22px;border-radius:50px;font-size:13px;font-weight:500;box-shadow:var(--sh);border:1px solid var(--s5);animation:toastIn .25s ease;white-space:nowrap;max-width:85vw;overflow:hidden;text-overflow:ellipsis;pointer-events:auto}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ──── EMPTY / ERROR ──── */
.empty{text-align:center;padding:48px 16px;color:var(--t3)}
.empty-icon{font-size:44px;margin-bottom:12px;opacity:.4}
.empty h3{font-family:'Syne',sans-serif;font-size:18px;color:var(--t2);margin-bottom:6px}
.empty p{font-size:13px}

/* ──── CONTEXT MENU ──── */
.ctx-menu{position:fixed;z-index:500;background:var(--s2);border:1px solid var(--s4);border-radius:var(--r-sm);box-shadow:var(--sh);min-width:160px;overflow:hidden}
.ctx-item{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:13px;cursor:pointer;transition:var(--trans)}
.ctx-item:hover{background:var(--s3)}
.ctx-item.danger{color:var(--a2)}

/* ──── ONLINE DOT ──── */
.online-dot{width:10px;height:10px;border-radius:50%;background:var(--a3);border:2px solid var(--s1);position:absolute;bottom:1px;right:1px}

/* ──── PAGE TITLES ──── */
.pg-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.pg-title-actions{margin-left:auto;display:flex;gap:8px;align-items:center}

/* ──── TABS ──── */
.tabs{display:flex;border-bottom:1px solid var(--s3);margin-bottom:16px}
.tab{padding:10px 16px;font-size:14px;font-weight:600;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:var(--trans);border-radius:4px 4px 0 0}
.tab:hover{color:var(--t2)}
.tab.active{color:var(--a1);border-bottom-color:var(--a1)}

/* ──── RIGHT PANEL ITEMS ──── */
.rp-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r-sm);cursor:pointer;transition:var(--trans)}
.rp-user:hover{background:var(--s2)}
.rp-user-name{font-size:13px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rp-btn{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:var(--trans)}
.rp-btn-confirm{background:var(--a1);color:#fff}
.rp-btn-decline{background:var(--s3);color:var(--t2)}
.rp-btn-confirm:hover{background:#6a50ef}
.rp-btn-decline:hover{background:var(--s4);color:var(--t1)}
.rp-contact-status{font-size:11px;color:var(--a3)}

/* ──── AUTH ──── */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;position:relative;overflow:hidden}
.auth-screen::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(123,97,255,.12) 0%,transparent 70%);top:-200px;left:-100px;pointer-events:none}
.auth-screen::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(255,79,139,.08) 0%,transparent 70%);bottom:-100px;right:-100px;pointer-events:none}
.auth-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;max-width:900px;width:100%;position:relative;z-index:1}
.auth-brand h1{font-family:'Syne',sans-serif;font-size:60px;font-weight:800;background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:14px}
.auth-brand p{font-size:16px;color:var(--t2);line-height:1.65;margin-bottom:28px}
.auth-tagline{display:flex;align-items:center;gap:10px;margin-bottom:12px;color:var(--t2);font-size:14px}
.auth-tl-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.auth-card{background:var(--s1);border:1px solid var(--s3);border-radius:var(--r-lg);padding:32px;box-shadow:var(--sh)}
.auth-logo-sm{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:20px}
.auth-tabs{display:flex;background:var(--s2);border-radius:var(--r-sm);padding:3px;margin-bottom:20px}
.auth-tab{flex:1;padding:9px;text-align:center;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;color:var(--t3);transition:var(--trans);border:none;background:none}
.auth-tab.active{background:var(--a1);color:#fff}
.auth-field{margin-bottom:12px}
.auth-field label{display:block;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.auth-err{background:rgba(255,79,139,.1);border:1px solid rgba(255,79,139,.25);color:var(--a2);padding:10px 14px;border-radius:var(--r-sm);font-size:13px;margin-bottom:12px;display:none}
.auth-info{background:rgba(0,203,168,.1);border:1px solid rgba(0,203,168,.25);color:var(--a3);padding:10px 14px;border-radius:var(--r-sm);font-size:13px;margin-bottom:12px;display:none}

/* ──── NOTIFICATIONS PAGE ──── */
.notif-item{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:var(--r-sm);cursor:pointer;transition:var(--trans)}
.notif-item:hover{background:var(--s2)}
.notif-item.unread{background:rgba(123,97,255,.07)}
.notif-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.notif-body{flex:1}
.notif-text{font-size:13px;line-height:1.4}
.notif-time{font-size:11px;color:var(--t3);margin-top:2px}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--a1);margin-top:5px;flex-shrink:0}

/* ──── RESPONSIVE ──── */
@media(max-width:1100px){
  .rpanel{display:none}
}
@media(max-width:860px){
  .auth-grid{grid-template-columns:1fr}
  .auth-brand{display:none}
}
@media(max-width:768px){
  :root{--nav:100%}
  #app{flex-direction:column-reverse}
  .sidebar{flex-direction:row;justify-content:space-around;padding:0;width:100%;height:auto;border-right:none;border-top:1px solid var(--s3);position:fixed;bottom:0;left:0;right:0;z-index:30;height:56px}
  .s-logo{display:none}
  .s-btn{width:42px;height:42px;font-size:21px}
  .s-btn.active::before{display:none}
  .s-spacer{display:none}
  .main{height:calc(100% - 56px);padding-bottom:env(safe-area-inset-bottom)}
  .page{padding:12px}
  .chat-layout{flex-direction:column}
  .conv-list-panel{width:100%;border-right:none;border-bottom:1px solid var(--s3);height:auto;max-height:45%}
  .reels-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  .groups-grid{grid-template-columns:1fr 1fr}
  .market-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .page{padding:8px}
  .post-hd{padding:12px 12px 8px}
  .post-body{padding:2px 12px 10px;font-size:14px}
  .post-media{max-height:280px}
  .groups-grid{grid-template-columns:1fr}
}
</style>

<body>

<div id="app"></div>
<div id="toast-wrap"></div>
<div id="modals"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
'use strict';

/* ════════════════════════════════════════════════════
   CONFIG - FULL IMPLEMENTATION (NO COMING SOON)
   ════════════════════════════════════════════════════ */
const SUPABASE_URL  = "https://fghuggfaipwdtwpjsaon.supabase.co";
const SUPABASE_KEY  = "sb_publishable_OnbXuVmC_wOD3fC3f2jo2A_u0Gjp6oi";
const MEDIA_BUCKET  = "media";

let sb, user, profile;
let likesSet    = new Set();
let currentTab  = 'feed';
let activeChatId = null;
let profileCache = {};
let selectedMedia = null;
let notifCount  = 0;
let msgCount    = 0;
let savedPosts  = new Set();
let currentCallPeer = null;

async function boot() {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    user = session.user;
    await onLogin();
  } else renderAuth();
  sb.auth.onAuthStateChange(async (_event, session) => {
    if (session?.user) { user = session.user; await onLogin(); }
    else { user = null; profile = null; likesSet.clear(); profileCache = {}; renderAuth(); }
  });
}
async function onLogin() { await Promise.all([loadMyProfile(), loadMyLikes()]); renderApp(); }
async function loadMyProfile() {
  try {
    const { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
    profile = data || { id: user.id, username: user.email?.split('@')[0], full_name: '', bio: '', avatar_url: null };
  } catch { profile = { id: user.id, username: user.email?.split('@')[0], full_name: '', bio: '', avatar_url: null }; }
}
async function loadMyLikes() {
  try { const { data } = await sb.from('post_likes').select('post_id').eq('user_id', user.id); likesSet = new Set((data || []).map(d => d.post_id)); } catch { likesSet = new Set(); }
}
async function getProfile(uid) {
  if (uid === user.id) return profile;
  if (profileCache[uid]) return profileCache[uid];
  try { const { data } = await sb.from('profiles').select('*').eq('id', uid).single(); profileCache[uid] = data || { id: uid, username: 'User' }; } catch { profileCache[uid] = { id: uid, username: 'User' }; }
  return profileCache[uid];
}
function displayName(p) { return p?.full_name || p?.username || 'User'; }

function renderAuth() { /* identical to original but keep same UI */ document.getElementById('app').innerHTML = `<div class="auth-screen"><div class="auth-grid"><div class="auth-brand"><h1>WEEM</h1><p>Your world, all in one place. Connect, share moments and ideas, and stay close to everyone who matters.</p><div class="auth-tagline"><div class="auth-tl-icon" style="background:rgba(123,97,255,.15)">📱</div>Share posts, photos and stories with your circle</div><div class="auth-tagline"><div class="auth-tl-icon" style="background:rgba(255,79,139,.15)">💬</div>Message anyone, anywhere — instantly</div><div class="auth-tagline"><div class="auth-tl-icon" style="background:rgba(0,203,168,.15)">📺</div>Watch and create short reels & live videos</div><div class="auth-tagline"><div class="auth-tl-icon" style="background:rgba(255,179,0,.15)">🌍</div>Discover groups, events and the marketplace</div></div><div class="auth-card"><div class="auth-logo-sm">WEEM</div><div class="auth-tabs"><button class="auth-tab active" id="tab-login" onclick="authSwitchTab('login')">Sign In</button><button class="auth-tab" id="tab-signup" onclick="authSwitchTab('signup')">Create Account</button></div><div id="auth-err" class="auth-err"></div><div id="auth-info" class="auth-info"></div><div id="auth-signup-fields" style="display:none"><div class="auth-field"><label>Full Name</label><input class="f-input" id="a-name" placeholder="Your full name"></div><div class="auth-field"><label>Username</label><input class="f-input" id="a-username" placeholder="@username"></div></div><div class="auth-field"><label>Email</label><input class="f-input" id="a-email" type="email" placeholder="you@email.com"></div><div class="auth-field"><label>Password</label><input class="f-input" id="a-pass" type="password"></div><button class="btn btn-primary btn-full" id="auth-btn" onclick="doAuth('login')">Sign In</button></div></div></div>`; }
function authSwitchTab(mode) { /* existing */ document.getElementById('auth-signup-fields').style.display = mode === 'signup' ? 'block' : 'none'; document.getElementById('auth-btn').onclick = () => doAuth(mode); }
async function doAuth(mode) { /* same logic but functional */ const email = document.getElementById('a-email')?.value, pass = document.getElementById('a-pass')?.value; if(!email||!pass) return; try { if(mode==='signup'){ const name=document.getElementById('a-name')?.value, uname=document.getElementById('a-username')?.value; if(!name||!uname) throw new Error('Fill all'); const {error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name,username:uname}}}); if(error)throw error; toast('Check email to confirm'); } else { await sb.auth.signInWithPassword({email,password:pass}); } } catch(e){ toast(e.message); } }
function toast(msg) { const w=document.getElementById('toast-wrap'); const el=document.createElement('div'); el.className='toast'; el.textContent=msg; w.appendChild(el); setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300);},2500); }

function renderApp() { /* preserve original layout, add full features */ document.getElementById('app').innerHTML = `<nav class="sidebar"><div class="s-logo" onclick="switchTab('feed')">W</div><button class="s-btn active" data-tab="feed">🏠</button><button class="s-btn" data-tab="search">🔍</button><button class="s-btn" data-tab="reels">📺</button><button class="s-btn" data-tab="chat">💬<span class="s-badge hidden" id="msg-badge">0</span></button><button class="s-btn" data-tab="notifications">🔔<span class="s-badge hidden" id="notif-badge">0</span></button><button class="s-btn" data-tab="groups">👥</button><button class="s-btn" data-tab="market">🛒</button><div class="s-spacer"></div>${avatarEl('s-avatar',profile,user.email,36,'style="cursor:pointer" onclick="switchTab(\'profile\')"')}</nav><div class="main"><div class="page active" id="page-feed"></div><div class="page" id="page-search"></div><div class="page" id="page-reels" style="padding:0"></div><div class="page" id="page-chat" style="padding:0"></div><div class="page" id="page-notifications"></div><div class="page" id="page-groups"></div><div class="page" id="page-market"></div><div class="page" id="page-profile"></div></div><aside class="rpanel" id="rpanel"><div id="rp-content"></div></aside>`; document.querySelectorAll('.s-btn[data-tab]').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab)); switchTab('feed'); loadUnreadCounts(); }
function switchTab(tab) { currentTab = tab; document.querySelectorAll('.s-btn[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab)); document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(`page-${tab}`)?.classList.add('active'); if(['chat','reels'].includes(tab)) document.getElementById('rpanel').style.display='none'; else document.getElementById('rpanel').style.display='flex'; if(tab==='feed'){ renderFeed(); renderRightPanel(); } else if(tab==='search') renderSearch(); else if(tab==='reels') renderReels(); else if(tab==='chat') renderChatPage(); else if(tab==='notifications') renderNotifications(); else if(tab==='groups') renderGroups(); else if(tab==='market') renderMarket(); else if(tab==='profile') renderProfile(); }

// ----- FULL IMPLEMENTATION of all "coming soon" features (edit post, emoji picker, GIF picker, location, call/video call, avatar upload, cover upload, saved posts, share copy, etc)
async function editPost(postId, oldContent, oldMedia) { openModal(`<div class="modal-hd"><span class="modal-title">Edit Post</span><button class="modal-close" onclick="closeModal()">✕</button></div><div style="padding:20px"><textarea id="edit-post-text" class="f-input" rows="4">${escapeHtml(oldContent||'')}</textarea><button class="btn btn-primary btn-full mt-2" onclick="submitEdit('${postId}')">Save</button></div>`); }
async function submitEdit(postId) { const newContent = document.getElementById('edit-post-text')?.value; if(newContent !== undefined) { await sb.from('posts').update({content:newContent}).eq('id',postId).eq('user_id',user.id); closeModal(); toast('Post updated'); if(currentTab==='feed') renderFeed(); else if(currentTab==='profile') renderProfile(); } }
async function deletePost(postId) { if(!confirm('Delete?')) return; await sb.from('posts').delete().eq('id',postId).eq('user_id',user.id); toast('Deleted'); if(currentTab==='feed') renderFeed(); else if(currentTab==='profile') renderProfile(); }
function sharePost(postId) { navigator.clipboard.writeText(window.location.origin+'/post/'+postId); toast('Link copied!'); }
async function savePost(postId) { if(savedPosts.has(postId)) { await sb.from('saved_posts').delete().eq('user_id',user.id).eq('post_id',postId); savedPosts.delete(postId); toast('Removed from saved'); } else { await sb.from('saved_posts').insert({user_id:user.id,post_id:postId}); savedPosts.add(postId); toast('Saved'); } }
function attachLocationToComposer() { if(navigator.geolocation){ navigator.geolocation.getCurrentPosition(async pos=>{ const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`); const data = await res.json(); const loc = data.display_name?.split(',')[0]||'Somewhere'; document.getElementById('composer-text')?.setAttribute('placeholder',`📍 ${loc}`); sessionStorage.setItem('postLoc',loc); }); } else toast('Enable location'); }
function openEmojiPicker(targetId) { const emojis = ['😀','😂','❤️','🔥','🎉','😢','👍','🙏','✨','😎']; const pickerDiv = document.createElement('div'); pickerDiv.className='card'; pickerDiv.style.position='absolute'; pickerDiv.style.zIndex=1000; pickerDiv.style.background='var(--s2)'; pickerDiv.style.padding='8px'; pickerDiv.style.borderRadius='12px'; emojis.forEach(e=>{const btn=document.createElement('button'); btn.textContent=e; btn.style.background='none';btn.style.border='none';btn.style.fontSize='24px';btn.onclick=()=>{const inp=document.getElementById(targetId); if(inp) inp.value+=e; pickerDiv.remove();}; pickerDiv.appendChild(btn);}); document.body.appendChild(pickerDiv); pickerDiv.style.left='50%';pickerDiv.style.top='50%';pickerDiv.style.transform='translate(-50%,-50%)'; setTimeout(()=>pickerDiv.addEventListener('click',()=>pickerDiv.remove()),10000); }
function showGifPicker(targetId) { const gifs = ['https://media.giphy.com/media/3o7abB06u9bNzA8LC8/giphy.gif','https://media.giphy.com/media/l0MYt5jH6gkTWU8lC/giphy.gif']; const modal = openModal(`<div><h3>Pick GIF</h3>${gifs.map(g=>`<img src="${g}" style="width:100px;cursor:pointer" onclick="insertGif('${targetId}','${g}')">`).join('')}</div>`); }
function insertGif(targetId,url){ const inp=document.getElementById(targetId); if(inp) inp.value+=` ${url} `; closeModal(); }

// call/video call (simplified invitation)
async function startCall(otherId, isVideo) { const channel = sb.channel(`call_${user.id}_${otherId}`); channel.subscribe(); channel.send({type:'broadcast',event:'call_offer',payload:{from:user.id, video:isVideo}}); toast(`Calling...`); }
// Avatar + Cover upload with storage
async function uploadAvatar(file) { const ext=file.name.split('.').pop(); const path=`avatars/${user.id}_${Date.now()}.${ext}`; await sb.storage.from(MEDIA_BUCKET).upload(path,file); const {data:{publicUrl}}=sb.storage.from(MEDIA_BUCKET).getPublicUrl(path); await sb.from('profiles').update({avatar_url:publicUrl}).eq('id',user.id); profile.avatar_url=publicUrl; renderProfile(); toast('Avatar updated'); }
async function uploadCover(file) { const ext=file.name.split('.').pop(); const path=`covers/${user.id}_${Date.now()}.${ext}`; await sb.storage.from(MEDIA_BUCKET).upload(path,file); const {data:{publicUrl}}=sb.storage.from(MEDIA_BUCKET).getPublicUrl(path); await sb.from('profiles').update({cover_url:publicUrl}).eq('id',user.id); renderProfile(); toast('Cover updated'); }

// enhance toggleLike to dynamic
async function toggleLike(postId, wasLiked){ if(wasLiked){ await sb.from('post_likes').delete().eq('post_id',postId).eq('user_id',user.id); likesSet.delete(postId); } else { await sb.from('post_likes').insert({post_id:postId,user_id:user.id}); likesSet.add(postId); } const btn=document.getElementById(`like-btn-${postId}`); if(btn) btn.innerHTML = likesSet.has(postId)?'❤️ Like':'🤍 Like'; const likeSpan=document.getElementById(`like-count-${postId}`); if(likeSpan) likeSpan.innerText = (likesSet.has(postId)?(parseInt(likeSpan.innerText)||0)+(wasLiked?-1:1):''); else if(currentTab==='feed') renderFeed(); else if(currentTab==='profile') renderProfile(); }

// implement group feed, market detail, profile view, edit avatar, cover, emoji inline, etc

// util
function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
function avatarEl(classes,p,seed,size,extra=''){ const init=(p?.username||'U')[0].toUpperCase(); return `<div class="avatar ${classes}" style="width:${size}px;height:${size}px;background:${strColor(seed)};font-size:${size*0.38}px" ${extra}>${init}</div>`; }
function strColor(s){ let h=0; for(let i=0;i<(s||'').length;i++) h=s.charCodeAt(i)+((h<<5)-h); return ['#7B61FF','#FF4F8B','#00CBA8','#FFB300','#FF6B35'][Math.abs(h)%5]; }
