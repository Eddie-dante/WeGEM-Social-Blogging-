<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEEM v2</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.container { max-width:520px; margin:auto; padding:15px; }

.card { background:#fff; padding:15px; border-radius:12px; margin-bottom:12px; }
.post { background:#fff; padding:12px; border-radius:12px; margin-bottom:10px; }

input, textarea {
  width:100%; padding:10px; margin:8px 0;
  border-radius:8px; border:1px solid #ddd;
}

button {
  padding:10px; border:none; border-radius:8px;
  cursor:pointer; color:white;
}

.blue { background:#1877f2; }
.green { background:#28a745; }
.gray { background:#555; }

.header {
  display:flex; justify-content:space-between; align-items:center;
}

.small { font-size:12px; color:#888; }

.like {
  background:#f0f2f5; color:#333; padding:6px 10px;
  border-radius:20px; font-size:13px;
}
</style>
</head>

<body>

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>

<script>
const SUPABASE_URL = "https://fghuggfaipwdtwpjsaon.supabase.co"
const SUPABASE_KEY = "sb_publishable_OnbXuVmC_wOD3fC3f2jo2A_u0Gjp6oi"

let supabase
let user = null
const app = document.getElementById("app")

// START FAST
loginUI()
init()

// INIT
async function init() {
    try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

        const { data } = await supabase.auth.getSession()

        if (data?.session?.user) {
            user = data.session.user
            dashboard()
        }
    } catch (e) {
        console.log(e)
        app.innerHTML = "Failed to connect"
    }

    supabase.auth.onAuthStateChange((_, session) => {
        if (session?.user) {
            user = session.user
            dashboard()
        }
    })
}

// LOGIN UI
function loginUI() {
    app.innerHTML = `
    <div class="container">
        <h2>WEEM</h2>
        <div class="card">
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <button class="blue" onclick="login()">Login</button>
            <p onclick="signupUI()" style="cursor:pointer;color:#1877f2;">Create account</p>
        </div>
    </div>`
}

// SIGNUP UI
function signupUI() {
    app.innerHTML = `
    <div class="container">
        <h2>Signup</h2>
        <div class="card">
            <input id="username" placeholder="Username">
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <button class="green" onclick="signup()">Signup</button>
            <p onclick="loginUI()" style="cursor:pointer;color:#1877f2;">Back</p>
        </div>
    </div>`
}

// LOGIN
window.login = async function() {
    const email = email.value
    const password = password.value

    const { error } = await supabase.auth.signInWithPassword({
        email, password
    })

    if (error) return alert(error.message)
}

// SIGNUP
window.signup = async function() {
    const username = username.value
    const email = email.value
    const password = password.value

    const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: { data: { username } }
    })

    if (error) return alert(error.message)

    if (data?.user) {
        await supabase.from("profiles").insert({
            id: data.user.id,
            username,
            email
        })

        alert("Check email to confirm account")
        loginUI()
    }
}

// LOGOUT
window.logout = async function() {
    await supabase.auth.signOut()
    user = null
    loginUI()
}

// DASHBOARD
async function dashboard() {
    const { data: posts } = await supabase
        .from("posts")
        .select("*")
        .order("created_at", { ascending:false })

    let html = ""

    posts?.forEach(p => {
        html += `
        <div class="post">
            <b>${p.title}</b>
            <p>${p.content}</p>

            <div class="small">
                ${timeAgo(p.created_at)}
            </div>

            <button class="like" onclick="likePost('${p.id}', ${p.likes || 0})">
                ❤️ ${p.likes || 0}
            </button>
        </div>`
    })

    app.innerHTML = `
    <div class="container">

        <div class="header">
            <h3>${user.email}</h3>
            <button class="gray" onclick="logout()">Logout</button>
        </div>

        <div class="card">
            <input id="title" placeholder="Title">
            <textarea id="content" placeholder="What's on your mind?"></textarea>
            <button class="blue" onclick="createPost()">Post</button>
        </div>

        ${html || "<p>No posts yet</p>"}

    </div>`
}

// CREATE POST
window.createPost = async function() {
    const title = title.value
    const content = content.value

    const { error } = await supabase.from("posts").insert({
        user_id: user.id,
        title,
        content,
        likes: 0
    })

    if (error) return alert(error.message)

    dashboard()
}

// LIKE POST
window.likePost = async function(id, likes) {
    await supabase
        .from("posts")
        .update({ likes: likes + 1 })
        .eq("id", id)

    dashboard()
}

// TIME AGO
function timeAgo(date) {
    const diff = Math.floor((new Date() - new Date(date)) / 60000)
    if (diff < 1) return "just now"
    if (diff < 60) return diff + " min ago"
    return Math.floor(diff / 60) + " hrs ago"
}
</script>

</body>
</html>
