<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEEM</title>

<style>
body { font-family: Arial; margin:0; background:#f0f2f5; }
.container { max-width:500px; margin:auto; padding:20px; }
.card { background:#fff; padding:20px; border-radius:10px; margin-bottom:15px; }
input, textarea { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ddd; }
button { padding:12px; border:none; border-radius:8px; color:#fff; cursor:pointer; }
.blue { background:#0066cc; }
.green { background:#28a745; }
.gray { background:#666; }
.post { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; }
.small { font-size:12px; color:#999; }
.header { display:flex; justify-content:space-between; align-items:center; }
.loader { text-align:center; padding:40px; color:#666; }
</style>

</head>
<body>

<div id="app"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://fghuggfaipwdtwpjsaon.supabase.co'
const SUPABASE_KEY = 'sb_publishable_OnbXuVmC_wOD3fC3f2jo2A_u0Gjp6oi'

const app = document.getElementById('app')

let supabase = null
let currentUser = null

// 🚀 INSTANT UI (no waiting)
loginPage()

// ⏱ Load Supabase in background
initSupabase()

async function initSupabase() {
    let tries = 0

    while (!window.supabase && tries < 20) {
        await new Promise(r => setTimeout(r, 200))
        tries++
    }

    if (!window.supabase) {
        showError("No internet or CDN blocked")
        return
    }

    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    try {
        const { data } = await supabase.auth.getUser()
        if (data?.user) {
            currentUser = data.user
            dashboard()
        }
    } catch (e) {
        console.log(e)
    }
}

// ================= UI =================

function loginPage() {
    app.innerHTML = `
    <div class="container">
        <h2>WEEM</h2>
        <div class="card">
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <button class="blue" onclick="login()">Login</button>
            <p>No account? <a href="#" onclick="signupPage()">Signup</a></p>
        </div>
    </div>`
}

function signupPage() {
    app.innerHTML = `
    <div class="container">
        <h2>Signup</h2>
        <div class="card">
            <input id="username" placeholder="Username">
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <button class="green" onclick="signup()">Signup</button>
            <p><a href="#" onclick="loginPage()">Back</a></p>
        </div>
    </div>`
}

function showError(msg) {
    app.innerHTML = `<div class="loader">⚠️ ${msg}</div>`
}

// ================= AUTH =================

async function login() {
    if (!supabase) return alert("Still connecting...")

    const email = emailEl().value
    const password = passwordEl().value

    const { data, error } = await supabase.auth.signInWithPassword({ email, password })

    if (error) return alert(error.message)

    currentUser = data.user
    dashboard()
}

async function signup() {
    if (!supabase) return alert("Still connecting...")

    const username = document.getElementById('username').value
    const email = emailEl().value
    const password = passwordEl().value

    const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: { data: { username } }
    })

    if (error) return alert(error.message)

    if (data?.user) {
        await supabase.from('profiles').insert({
            id: data.user.id,
            username,
            email
        })
        currentUser = data.user
        dashboard()
    }
}

async function logout() {
    await supabase.auth.signOut()
    currentUser = null
    loginPage()
}

// ================= DASHBOARD =================

async function dashboard() {
    app.innerHTML = `<div class="loader">Loading feed...</div>`

    const { data: posts } = await supabase
        .from('posts')
        .select('*')
        .order('created_at', { ascending: false })

    let html = ''

    posts?.forEach(p => {
        html += `
        <div class="post">
            <b>${safe(p.title)}</b>
            <p>${safe(p.content)}</p>
            <div class="small">${new Date(p.created_at).toLocaleString()}</div>
        </div>`
    })

    app.innerHTML = `
    <div class="container">
        <div class="header">
            <h3>${safe(currentUser.email)}</h3>
            <button class="gray" onclick="logout()">Logout</button>
        </div>

        <div class="card">
            <input id="title" placeholder="Title">
            <textarea id="content" placeholder="Write something..."></textarea>
            <button class="blue" onclick="createPost()">Post</button>
        </div>

        ${html || '<p>No posts yet</p>'}
    </div>`
}

// ================= POSTS =================

async function createPost() {
    const title = document.getElementById('title').value
    const content = document.getElementById('content').value

    if (!title || !content) return alert("Fill all fields")

    await supabase.from('posts').insert({
        user_id: currentUser.id,
        title,
        content
    })

    dashboard()
}

// ================= HELPERS =================

function emailEl(){ return document.getElementById('email') }
function passwordEl(){ return document.getElementById('password') }

function safe(t){
    const d = document.createElement('div')
    d.textContent = t
    return d.innerHTML
}
</script>

</body>
</html>
